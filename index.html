<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小八的家 - 第三人称</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: "Microsoft YaHei", sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 14px;
            user-select: none;
            border-left: 4px solid #f1c40f;
        }
        #interact-hint {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 18px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        #interact-hint.visible { opacity: 1; }
        #action-feedback {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
            background: rgba(0,0,0,0.5);
            padding: 8px 24px;
            border-radius: 40px;
        }
        #action-feedback.show { opacity: 1; }
        #controls-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            background: rgba(0,0,0,0.4);
            padding: 6px 18px;
            border-radius: 20px;
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="info">🐶 小八的家 | 卧室 · 客厅 · 厨房 · 卫生间</div>
    <div id="interact-hint">按 <kbd>E</kbd> 互动</div>
    <div id="action-feedback"></div>
    <div id="controls-hint">WASD 移动 · 空格 跳跃 · 鼠标拖动视角 · 滚轮缩放</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';

        // ==================== 场景初始化 ====================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xD4C5A9);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // ==================== 灯光 ====================
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);

        const hemiLight = new THREE.HemisphereLight(0xffeedd, 0x8d7c6b, 0.6);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xfff8e7, 0.6);
        dirLight.position.set(3, 6, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 12;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 25;
        scene.add(dirLight);

        // ==================== 9m × 9m 房子盒子 ====================
        const houseHalf = 4.5;
        const wallH = 2.8;
        const wallThick = 0.15;
        const wallColor = 0xD4C5A9;

        // ==================== 碰撞体积系统 ====================
        // colliders 存放所有 AABB 碰撞盒，格式：{ minX, maxX, minZ, maxZ }
        const colliders = [];
        const playerRadius = 0.25; // 法斗碰撞半径（米）

        function addCollider(cx, cz, halfW, halfD) {
            colliders.push({
                minX: cx - halfW,
                maxX: cx + halfW,
                minZ: cz - halfD,
                maxZ: cz + halfD
            });
        }

        function addWall(x, z, w, d) {
            const geo = new THREE.BoxGeometry(w, wallH, d);
            const mat = new THREE.MeshStandardMaterial({ color: wallColor, roughness: 0.7 });
            const wall = new THREE.Mesh(geo, mat);
            wall.position.set(x, wallH / 2, z);
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
            // 同步注册碰撞体积
            addCollider(x, z, w / 2, d / 2);
            return wall;
        }

        // 四面墙壁
        addWall(0, -houseHalf, 9, wallThick);          // 前
        addWall(0, houseHalf, 9, wallThick);           // 后
        addWall(-houseHalf, 0, wallThick, 9);          // 左
        addWall(houseHalf, 0, wallThick, 9);           // 右

        // ==================== 地板 ====================
        const floorGeo = new THREE.PlaneGeometry(9, 9);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0xD4A76A, roughness: 0.45, metalness: 0.03 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.set(0, 0.01, 0);
        floor.receiveShadow = true;
        scene.add(floor);

        // 木地板纹理线
        for (let i = -4.5; i <= 4.5; i += 0.5) {
            const lineGeo = new THREE.BoxGeometry(0.025, 0.005, 9);
            const lineMat = new THREE.MeshStandardMaterial({ color: 0xB8895A, roughness: 0.6 });
            const line = new THREE.Mesh(lineGeo, lineMat);
            line.position.set(i, 0.015, 0);
            line.receiveShadow = true;
            scene.add(line);
        }
        for (let i = -4.5; i <= 4.5; i += 0.5) {
            const lineGeo2 = new THREE.BoxGeometry(9, 0.005, 0.025);
            const lineMat = new THREE.MeshStandardMaterial({ color: 0xB8895A, roughness: 0.6 });
            const line2 = new THREE.Mesh(lineGeo2, lineMat);
            line2.position.set(0, 0.015, i);
            line2.receiveShadow = true;
            scene.add(line2);
        }

        // ==================== 天花板 ====================
        const ceilGeo = new THREE.PlaneGeometry(9, 9);
        const ceilMat = new THREE.MeshStandardMaterial({ color: 0xF5F0E8, roughness: 0.7, side: THREE.DoubleSide });
        const ceiling = new THREE.Mesh(ceilGeo, ceilMat);
        ceiling.rotation.x = -Math.PI / 2;
        ceiling.position.set(0, wallH, 0);
        ceiling.receiveShadow = true;
        scene.add(ceiling);

        // ==================== 点光源 ====================
        const lightPositions = [
            { x: -2.2, z: -2.2 }, { x: 2.2, z: -2.2 },
            { x: -2.2, z: 2.2 },  { x: 2.2, z: 2.2 }
        ];
        lightPositions.forEach(lp => {
            const pl = new THREE.PointLight(0xfff5e6, 0.6, 7);
            pl.position.set(lp.x, 2.2, lp.z);
            scene.add(pl);
        });

        const centerLight = new THREE.PointLight(0xfffae6, 1.0, 12);
        centerLight.position.set(0, 2.5, 0);
        scene.add(centerLight);

        // ==================== 房间模型加载 ====================
        const gltfLoader = new GLTFLoader();

        function loadObjRoom(objFile, mtlFile, scale, posX, posZ, rotY, label) {
            const mtlLoader = new MTLLoader();
            mtlLoader.load(mtlFile, (materials) => {
                materials.preload();
                const objLoader = new OBJLoader();
                objLoader.setMaterials(materials);
                objLoader.load(objFile, (room) => {
                    room.scale.set(scale, scale, scale);
                    room.position.set(posX, 0, posZ);
                    room.rotation.y = rotY;
                    room.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });
                    scene.add(room);
                    console.log(`✅ ${label} (OBJ) 加载成功！`);
                }, undefined, (error) => {
                    console.error(`❌ ${label} OBJ加载失败:`, error);
                });
            }, undefined, (error) => {
                console.error(`❌ ${label} MTL加载失败:`, error);
            });
        }

        function loadRoom(filename, scale, posX, posZ, rotY, label) {
            gltfLoader.load(filename, (gltf) => {
                const room = gltf.scene;
                room.scale.set(scale, scale, scale);
                room.position.set(posX, 0, posZ);
                room.rotation.y = rotY;
                room.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                scene.add(room);
                console.log(`✅ ${label} 加载成功！`);
            }, undefined, (error) => {
                console.error(`❌ ${label} 加载失败:`, error);
            });
        }

        // 四个房间均匀分布在 9m×9m 空间内
        const spacingX = 2.5;
        const spacingZ = 2.0;
        const bedroomOffsetX = 0.85; // 卧室往客厅方向微调
        const kitchenOffsetZ = 0.5;  // 厨房往卧室方向微调
        const bathroomOffsetZ = 0.35; // 卫生间往客厅方向微调
        loadRoom('bedroom.glb',   0.5, -spacingX + bedroomOffsetX, -spacingZ, 0,              '卧室');
        loadObjRoom('livingroom.obj', 'livingroom.mtl', 0.5, spacingX, -spacingZ, -Math.PI/2, '客厅');
        loadRoom('kitchen.glb',   0.5, -spacingX,  spacingZ - kitchenOffsetZ, Math.PI/2,      '厨房');

        // 额外加载厨房桌子模型（只取桌子和桌上物品）
        gltfLoader.load('kitchen_table.glb', (gltf) => {
            const tableScene = gltf.scene;
            tableScene.scale.set(0.5, 0.5, 0.5);
            tableScene.position.set(-spacingX, 0, spacingZ - kitchenOffsetZ);
            tableScene.rotation.y = Math.PI / 2;
            tableScene.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(tableScene);
            console.log('🍽️ 厨房桌子模型加载成功！');
        }, undefined, (error) => {
            console.error('❌ 厨房桌子加载失败:', error);
        });
        loadRoom('bathroom.glb',  0.5,  spacingX,  spacingZ - bathroomOffsetZ, Math.PI,       '卫生间');

        // 过渡墙体：厨房与卫生间之间的浅棕色连接墙
        const wallStartX = -spacingX + 1.5;
        const wallEndX = spacingX - 1.5;
        const wallCenterX = (wallStartX + wallEndX) / 2;
        const wallLength = wallEndX - wallStartX;
        const wallZ = (spacingZ - kitchenOffsetZ + spacingZ - bathroomOffsetZ) / 2 + 1.6;
        const wallGeo = new THREE.BoxGeometry(wallLength, 2.8, 0.3);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xE2A66D, roughness: 0.45, metalness: 0.03 });
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.set(wallCenterX, 1.4, wallZ);
        wall.castShadow = true;
        wall.receiveShadow = true;
        scene.add(wall);
        addCollider(wallCenterX, wallZ, wallLength / 2, 0.15); // 过渡墙1碰撞体积
        console.log('🧱 厨房-卫生间过渡墙已创建');

        // 过渡墙前面的装饰模型
        gltfLoader.load('transition_deco.glb', (gltf) => {
            const deco = gltf.scene;
            deco.scale.set(0.5, 0.5, 0.5);
            deco.position.set(wallCenterX + 0.1, 0.3, wallZ + 0.95);
            deco.rotation.y = Math.PI / 2;
            deco.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(deco);
            console.log('🖼️ 过渡墙装饰加载成功！');
        });

        // 过渡墙2：卫生间与客厅之间
        const wall2StartZ = -spacingZ + 1.5;
        const wall2EndZ = spacingZ - bathroomOffsetZ - 1.5;
        const wall2CenterZ = (wall2StartZ + wall2EndZ) / 2;
        const wall2Length = wall2EndZ - wall2StartZ;
        const wall2X = spacingX + 1.8;
        const wall2Geo = new THREE.BoxGeometry(0.3, 2.8, wall2Length);
        const wall2Mat = new THREE.MeshStandardMaterial({ color: 0xE2A66D, roughness: 0.45, metalness: 0.03 });
        const wall2 = new THREE.Mesh(wall2Geo, wall2Mat);
        wall2.position.set(wall2X, 1.4, wall2CenterZ);
        wall2.castShadow = true;
        wall2.receiveShadow = true;
        scene.add(wall2);
        addCollider(wall2X, wall2CenterZ, 0.15, wall2Length / 2); // 过渡墙2碰撞体积
        console.log('🧱 卫生间-客厅过渡墙已创建');

        // ==================== 路径 ====================
        const pathR = 3.5;
        const pathPoints = [
            { x: -pathR, z: -pathR }, { x: 0, z: -pathR }, { x: pathR, z: -pathR },
            { x: pathR, z: 0 }, { x: pathR, z: pathR },
            { x: 0, z: pathR }, { x: -pathR, z: pathR },
            { x: -pathR, z: 0 }, { x: -pathR, z: -pathR }
        ];
        const pathMat = new THREE.MeshStandardMaterial({
            color: 0xF9E79F, roughness: 0.3, transparent: true, opacity: 0.5,
            emissive: 0xF9E79F, emissiveIntensity: 0.3
        });
        for (let i = 0; i < pathPoints.length - 1; i++) {
            const p1 = pathPoints[i], p2 = pathPoints[i + 1];
            const dx = p2.x - p1.x, dz = p2.z - p1.z;
            const dist = Math.sqrt(dx * dx + dz * dz), angle = Math.atan2(dx, dz);
            const segments = Math.floor(dist / 0.2);
            for (let s = 0; s < segments; s++) {
                if (s % 2 === 0) {
                    const t = s / segments;
                    const seg = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.01, 0.12), pathMat);
                    seg.position.set(p1.x + dx * t, 0.02, p1.z + dz * t);
                    seg.rotation.y = angle;
                    scene.add(seg);
                }
            }
        }

        // ==================== 法斗模型 ====================
        const bulldogGroup = new THREE.Group();

        gltfLoader.load('french_dog.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.06, 0.06, 0.06);
            model.position.y = 0.0;
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            bulldogGroup.add(model);
            console.log('🐶 GLB法斗模型加载成功！');
        }, undefined, (error) => {
            console.error('❌ GLB加载失败:', error);
        });

        bulldogGroup.position.set(0, 0, 0);
        scene.add(bulldogGroup);

        // ==================== 交互系统 ====================
        const interactables = [
            {
                id: 'bedroom', name: '卧室', object: scene,
                position: new THREE.Vector3(-spacingX, 0, -spacingZ),
                action: () => showFeedback('🛏️ 小八的温暖卧室...')
            },
            {
                id: 'livingroom', name: '客厅', object: scene,
                position: new THREE.Vector3(spacingX, 0, -spacingZ),
                action: () => showFeedback('🛋️ 宽敞明亮的客厅...')
            },
            {
                id: 'kitchen', name: '厨房', object: scene,
                position: new THREE.Vector3(-spacingX, 0, spacingZ),
                action: () => showFeedback('🍳 香喷喷的厨房...')
            },
            {
                id: 'bathroom', name: '卫生间', object: scene,
                position: new THREE.Vector3(spacingX, 0, spacingZ),
                action: () => showFeedback('🚿 干净的卫生间...')
            },
            {
                id: 'photo', name: '旧照片', object: scene,
                position: new THREE.Vector3(-3.0, 0.3, 0),
                action: () => showFeedback('📷 墙上的旧照片记录着美好的回忆...')
            }
        ];

        const hintEl = document.getElementById('interact-hint');
        const feedbackEl = document.getElementById('action-feedback');
        let feedbackTimeout = null;

        function showFeedback(text) {
            feedbackEl.textContent = text;
            feedbackEl.classList.add('show');
            clearTimeout(feedbackTimeout);
            feedbackTimeout = setTimeout(() => feedbackEl.classList.remove('show'), 2500);
        }

        function checkInteraction() {
            const playerPos = bulldogGroup.position;
            let closestDist = Infinity, closestItem = null;
            interactables.forEach(item => {
                const dist = playerPos.distanceTo(item.position);
                if (dist < 2.0 && dist < closestDist) { closestDist = dist; closestItem = item; }
            });
            if (closestItem) {
                hintEl.textContent = `按 E 键 与 ${closestItem.name} 互动`;
                hintEl.classList.add('visible');
                return closestItem;
            } else {
                hintEl.classList.remove('visible');
                return null;
            }
        }

        // ==================== 第三人称控制 ====================
        const keyState = { w: false, a: false, s: false, d: false, space: false };
        const moveSpeed = 2.0;
        const playerDir = new THREE.Vector3();

        // ==================== 跳跃系统 ====================
        let velocityY = 0;
        const gravity = -12;
        const jumpForce = 4.5;
        const groundY = 0;      // 地面高度
        let isOnGround = true;

        let cameraYaw = Math.PI;
        let cameraPitch = 0.55;
        let cameraDistance = 3.5;
        const minDist = 2.0;
        const maxDist = 8.0;
        const mouseSensitivity = 0.004;
        let isMouseDown = false;
        let isRightDown = false;

        let smoothYaw = cameraYaw;
        let smoothPitch = cameraPitch;
        let smoothDist = cameraDistance;
        const smoothFactor = 0.12;

        let lastMouseX = 0, lastMouseY = 0;
        renderer.domElement.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                isMouseDown = true;
                lastMouseX = e.pageX;
                lastMouseY = e.pageY;
            }
            if (e.button === 2) {
                isRightDown = true;
                lastMouseX = e.pageX;
                lastMouseY = e.pageY;
            }
        });
        renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());
        window.addEventListener('mouseup', () => { isMouseDown = false; isRightDown = false; });
        window.addEventListener('mousemove', (e) => {
            if (!isMouseDown && !isRightDown) return;
            const dx = e.pageX - lastMouseX;
            const dy = e.pageY - lastMouseY;
            lastMouseX = e.pageX;
            lastMouseY = e.pageY;

            if (isMouseDown) {
                cameraYaw -= dx * mouseSensitivity;
                cameraPitch -= dy * mouseSensitivity;
                cameraPitch = Math.max(0.15, Math.min(Math.PI / 2 - 0.1, cameraPitch));
            }
            if (isRightDown) {
                cameraDistance += dy * 0.01;
                cameraDistance = Math.max(minDist, Math.min(maxDist, cameraDistance));
            }
        });

        renderer.domElement.addEventListener('wheel', (e) => {
            cameraDistance += e.deltaY * 0.01;
            cameraDistance = Math.max(minDist, Math.min(maxDist, cameraDistance));
            e.preventDefault();
        }, { passive: false });

        renderer.domElement.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isMouseDown = true;
                lastMouseX = e.touches[0].pageX;
                lastMouseY = e.touches[0].pageY;
            }
            if (e.touches.length === 2) {
                isMouseDown = false;
                const dx = e.touches[0].pageX - e.touches[1].pageX;
                const dy = e.touches[0].pageY - e.touches[1].pageY;
                lastMouseX = Math.sqrt(dx * dx + dy * dy);
            }
        });
        window.addEventListener('touchend', () => { isMouseDown = false; });
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1 && isMouseDown) {
                const dx = e.touches[0].pageX - lastMouseX;
                const dy = e.touches[0].pageY - lastMouseY;
                lastMouseX = e.touches[0].pageX;
                lastMouseY = e.touches[0].pageY;
                cameraYaw -= dx * mouseSensitivity;
                cameraPitch -= dy * mouseSensitivity;
                cameraPitch = Math.max(0.15, Math.min(Math.PI / 2 - 0.1, cameraPitch));
            }
            if (e.touches.length === 2) {
                const dx = e.touches[0].pageX - e.touches[1].pageX;
                const dy = e.touches[0].pageY - e.touches[1].pageY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                cameraDistance -= (dist - lastMouseX) * 0.02;
                cameraDistance = Math.max(minDist, Math.min(maxDist, cameraDistance));
                lastMouseX = dist;
            }
        });

        document.addEventListener('keydown', (e) => {
            switch (e.code) {
                case 'KeyW': keyState.w = true; e.preventDefault(); break;
                case 'KeyA': keyState.a = true; e.preventDefault(); break;
                case 'KeyS': keyState.s = true; e.preventDefault(); break;
                case 'KeyD': keyState.d = true; e.preventDefault(); break;
                case 'Space':
                    if (isOnGround) {
                        velocityY = jumpForce;
                        isOnGround = false;
                    }
                    e.preventDefault();
                    break;
                case 'KeyE':
                    const item = checkInteraction();
                    if (item) item.action();
                    e.preventDefault();
                    break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch (e.code) {
                case 'KeyW': keyState.w = false; e.preventDefault(); break;
                case 'KeyA': keyState.a = false; e.preventDefault(); break;
                case 'KeyS': keyState.s = false; e.preventDefault(); break;
                case 'KeyD': keyState.d = false; e.preventDefault(); break;
            }
        });

        // 检测点 (px, pz) 与某个 collider 是否重叠（含玩家半径）
        function resolveColliders(px, pz) {
            let rx = px, rz = pz;
            for (const c of colliders) {
                const expandedMinX = c.minX - playerRadius;
                const expandedMaxX = c.maxX + playerRadius;
                const expandedMinZ = c.minZ - playerRadius;
                const expandedMaxZ = c.maxZ + playerRadius;

                if (rx > expandedMinX && rx < expandedMaxX &&
                    rz > expandedMinZ && rz < expandedMaxZ) {
                    // 计算从哪个轴推出穿透量最小
                    const overlapLeft  = rx - expandedMinX;
                    const overlapRight = expandedMaxX - rx;
                    const overlapFront = rz - expandedMinZ;
                    const overlapBack  = expandedMaxZ - rz;
                    const minOverlap = Math.min(overlapLeft, overlapRight, overlapFront, overlapBack);

                    if (minOverlap === overlapLeft)       rx = expandedMinX;
                    else if (minOverlap === overlapRight) rx = expandedMaxX;
                    else if (minOverlap === overlapFront) rz = expandedMinZ;
                    else                                  rz = expandedMaxZ;
                }
            }
            return { x: rx, z: rz };
        }

        function updateMovement(dt) {
            const forward = new THREE.Vector3(-Math.sin(cameraYaw), 0, -Math.cos(cameraYaw)).normalize();
            const right = new THREE.Vector3(Math.cos(cameraYaw), 0, -Math.sin(cameraYaw)).normalize();

            playerDir.set(0, 0, 0);
            if (keyState.w) playerDir.add(forward);
            if (keyState.s) playerDir.sub(forward);
            if (keyState.a) playerDir.sub(right);
            if (keyState.d) playerDir.add(right);

            if (playerDir.length() > 0) {
                playerDir.normalize();
                const move = playerDir.clone().multiplyScalar(moveSpeed * dt);

                // 先分轴移动，再各自做碰撞解算（防止角落卡死）
                let newX = bulldogGroup.position.x + move.x;
                let newZ = bulldogGroup.position.z + move.z;

                // 世界边界（四面外墙内侧）
                newX = Math.max(-4.2, Math.min(4.2, newX));
                newZ = Math.max(-4.2, Math.min(4.2, newZ));

                // 碰撞解算：先只移动 X 轴
                const afterX = resolveColliders(newX, bulldogGroup.position.z);
                newX = afterX.x;
                // 再只移动 Z 轴
                const afterZ = resolveColliders(newX, newZ);
                newZ = afterZ.z;

                bulldogGroup.position.x = newX;
                bulldogGroup.position.z = newZ;

                const targetAngle = Math.atan2(move.x, move.z);
                let angleDiff = targetAngle - bulldogGroup.rotation.y;
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                bulldogGroup.rotation.y += angleDiff * Math.min(1, dt * 8);
            }

            // ---- 跳跃 / 重力 ----
            velocityY += gravity * dt;
            bulldogGroup.position.y += velocityY * dt;
            if (bulldogGroup.position.y <= groundY) {
                bulldogGroup.position.y = groundY;
                velocityY = 0;
                isOnGround = true;
            }
        }

        function updateCamera() {
            smoothYaw += (cameraYaw - smoothYaw) * smoothFactor;
            smoothPitch += (cameraPitch - smoothPitch) * smoothFactor;
            smoothDist += (cameraDistance - smoothDist) * smoothFactor;

            const target = new THREE.Vector3(
                bulldogGroup.position.x,
                bulldogGroup.position.y + 0.35,
                bulldogGroup.position.z
            );

            let camX = target.x + smoothDist * Math.sin(smoothYaw) * Math.cos(smoothPitch);
            let camY = target.y + smoothDist * Math.sin(smoothPitch);
            let camZ = target.z + smoothDist * Math.cos(smoothYaw) * Math.cos(smoothPitch);

            camX = Math.max(-4.0, Math.min(4.0, camX));
            camZ = Math.max(-4.0, Math.min(4.0, camZ));
            camY = Math.max(0.3, Math.min(4.0, camY)); // 上限提高以跟随跳跃

            camera.position.set(camX, camY, camZ);
            camera.lookAt(target);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==================== 动画循环 ====================
        const clock = new THREE.Clock();
        let walkCycle = 0;

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1);

            updateMovement(dt);
            updateCamera();

            const time = Date.now() * 0.001;
            const isMoving = keyState.w || keyState.a || keyState.s || keyState.d;

            if (bulldogGroup.children.length > 0 && bulldogGroup.children[0]) {
                const model = bulldogGroup.children[0];
                const modelBaseY = 0.28; // 模型相对于 bulldogGroup 的基础 Y

                if (!isOnGround) {
                    // 空中：通过 bulldogGroup 做轻微拉伸，不碰 model.scale
                    model.position.y = modelBaseY;
                    model.rotation.x = 0;
                    model.rotation.z = 0;
                    const stretchY = velocityY > 0 ? 1.08 : 0.92;
                    bulldogGroup.scale.set(1 / stretchY, stretchY, 1 / stretchY);
                } else if (isMoving) {
                    walkCycle += dt * 8;
                    const bounce = Math.abs(Math.sin(walkCycle)) * 0.03;
                    model.position.y = modelBaseY + bounce;
                    bulldogGroup.scale.set(1, 1, 1);
                    model.rotation.x = Math.sin(walkCycle) * 0.08;
                    model.rotation.z = Math.sin(walkCycle * 2) * 0.04;
                } else {
                    model.position.y += (modelBaseY - model.position.y) * 0.1;
                    model.rotation.x += (0 - model.rotation.x) * 0.1;
                    model.rotation.z += (0 - model.rotation.z) * 0.1;
                    walkCycle = 0;
                    const breathe = 1 + Math.sin(time * 3) * 0.015;
                    bulldogGroup.scale.set(breathe, breathe, breathe);
                }
            }

            renderer.render(scene, camera);
        }
        animate();

        console.log('🐶 小八的家已加载！第三人称视角 | WASD移动 | 鼠标拖动旋转 | 滚轮缩放 | E键互动');
    </script>
</body>
</html>
