<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小八的家 - 第三人称</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: "Microsoft YaHei", sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 14px;
            user-select: none;
            border-left: 4px solid #f1c40f;
        }
        #interact-hint {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 18px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        #interact-hint.visible { opacity: 1; }
        #action-feedback {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
            background: rgba(0,0,0,0.5);
            padding: 8px 24px;
            border-radius: 40px;
        }
        #action-feedback.show { opacity: 1; }
        #controls-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            background: rgba(0,0,0,0.4);
            padding: 6px 18px;
            border-radius: 20px;
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="info">🐶 小八的家 | 第三人称视角</div>
    <div id="interact-hint">按 <kbd>E</kbd> 互动</div>
    <div id="action-feedback"></div>
    <div id="controls-hint">WASD 移动 · 鼠标拖动视角 · 滚轮缩放</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ==================== 场景初始化 ====================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 10, 30);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // ==================== 灯光 ====================
        const ambientLight = new THREE.AmbientLight(0x606070);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xfff5d1, 1.0);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 10;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 15;
        scene.add(dirLight);

        const fillLight = new THREE.PointLight(0xffccaa, 0.6);
        fillLight.position.set(-2, 3, 4);
        scene.add(fillLight);

        const backLight = new THREE.PointLight(0xccddff, 0.4);
        backLight.position.set(0, 2, -3);
        scene.add(backLight);

        // ==================== 地面 ====================
        const floorGeo = new THREE.PlaneGeometry(8, 8);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0xC4956A, roughness: 0.6, metalness: 0.05 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.01;
        floor.receiveShadow = true;
        scene.add(floor);

        // 地板纹理线
        for (let i = -3.5; i <= 3.5; i += 1) {
            const lineGeo = new THREE.BoxGeometry(0.03, 0.005, 7);
            const lineMat = new THREE.MeshStandardMaterial({ color: 0xA0784C });
            const line = new THREE.Mesh(lineGeo, lineMat);
            line.position.set(i, 0, 0);
            line.receiveShadow = true;
            scene.add(line);
            const lineGeo2 = new THREE.BoxGeometry(7, 0.005, 0.03);
            const line2 = new THREE.Mesh(lineGeo2, lineMat);
            line2.position.set(0, 0, i);
            line2.receiveShadow = true;
            scene.add(line2);
        }

        // ==================== 墙壁 ====================
        function createWall(w, h, d, color, x, y, z, ry = 0) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.6 });
            const wall = new THREE.Mesh(geo, mat);
            wall.position.set(x, y, z);
            wall.rotation.y = ry;
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
            return wall;
        }

        // 后墙
        createWall(8, 2.8, 0.2, 0xf5ead5, 0, 1.4, -3.5);
        // 左墙
        createWall(0.2, 2.8, 7, 0xf5ead5, -3.5, 1.4, 0);
        // 右墙 (留门洞)
        createWall(0.2, 2.8, 2.5, 0xf5ead5, 3.5, 1.4, -1.5);
        createWall(0.2, 2.8, 2.5, 0xf5ead5, 3.5, 1.4, 2);
        // 前墙 (留窗户)
        createWall(2.5, 2.8, 0.2, 0xf5ead5, -1.5, 1.4, 3.5);
        createWall(2.5, 2.8, 0.2, 0xf5ead5, 2, 1.4, 3.5);

        // 窗户框
        function createWindowFrame(x, y, z, rx = 0) {
            const g = new THREE.Group();
            const fm = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
            // 外框
            const f1 = new THREE.Mesh(new THREE.BoxGeometry(0.06, 1.0, 0.06), fm);
            f1.position.set(0, 0, 0);
            g.add(f1);
            const f2 = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.06, 0.06), fm);
            f2.position.set(0, 0.47, 0);
            g.add(f2);
            const f3 = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.06, 0.06), fm);
            f3.position.set(0, -0.47, 0);
            g.add(f3);
            const f4 = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.3, 0.06), fm);
            f4.position.set(0, 0.23, 0);
            g.add(f4);
            const f5 = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.3, 0.06), fm);
            f5.position.set(0, -0.23, 0);
            g.add(f5);
            g.position.set(x, y, z);
            g.rotation.x = rx;
            scene.add(g);
        }
        createWindowFrame(0, 1.4, 3.45);

        // ==================== 家具 ====================

        // 沙发
        const sofaGroup = new THREE.Group();
        const sofaBase = new THREE.Mesh(
            new THREE.BoxGeometry(1.8, 0.4, 0.8),
            new THREE.MeshStandardMaterial({ color: 0x5B7DAF, roughness: 0.8 })
        );
        sofaBase.position.y = 0.2;
        sofaBase.castShadow = true; sofaBase.receiveShadow = true;
        sofaGroup.add(sofaBase);
        const sofaBack = new THREE.Mesh(
            new THREE.BoxGeometry(1.8, 0.6, 0.2),
            new THREE.MeshStandardMaterial({ color: 0x4A6A9A, roughness: 0.8 })
        );
        sofaBack.position.set(0, 0.5, -0.4);
        sofaBack.castShadow = true; sofaBack.receiveShadow = true;
        sofaGroup.add(sofaBack);
        const sofaArmL = new THREE.Mesh(
            new THREE.BoxGeometry(0.2, 0.5, 0.8),
            new THREE.MeshStandardMaterial({ color: 0x4A6A9A, roughness: 0.8 })
        );
        sofaArmL.position.set(-0.9, 0.35, 0);
        sofaArmL.castShadow = true; sofaArmL.receiveShadow = true;
        sofaGroup.add(sofaArmL);
        const sofaArmR = sofaArmL.clone();
        sofaArmR.position.set(0.9, 0.35, 0);
        sofaGroup.add(sofaArmR);
        sofaGroup.position.set(-0.5, 0, 2.2);
        sofaGroup.rotation.y = 0.3;
        scene.add(sofaGroup);

        // 茶几
        const tableTop = new THREE.Mesh(
            new THREE.BoxGeometry(1.2, 0.08, 0.6),
            new THREE.MeshStandardMaterial({ color: 0x9B7B5C, roughness: 0.7 })
        );
        tableTop.position.set(0.5, 0.42, 1.8);
        tableTop.castShadow = true; tableTop.receiveShadow = true;
        scene.add(tableTop);
        const legPoses = [[-0.4, 1.5], [0.4, 1.5], [-0.4, 2.1], [0.4, 2.1]];
        legPoses.forEach(p => {
            const leg = new THREE.Mesh(
                new THREE.CylinderGeometry(0.04, 0.05, 0.38, 8),
                new THREE.MeshStandardMaterial({ color: 0x5D4037 })
            );
            leg.position.set(p[0], 0.19, p[1]);
            leg.castShadow = true; leg.receiveShadow = true;
            scene.add(leg);
        });

        // 狗粮碗
        const bowlGroup = new THREE.Group();
        const bowlBase = new THREE.Mesh(
            new THREE.CylinderGeometry(0.22, 0.26, 0.1, 16),
            new THREE.MeshStandardMaterial({ color: 0xE67E22, roughness: 0.4 })
        );
        bowlBase.position.y = 0.05;
        bowlBase.castShadow = true; bowlBase.receiveShadow = true;
        bowlGroup.add(bowlBase);
        const bowlInner = new THREE.Mesh(
            new THREE.CylinderGeometry(0.18, 0.2, 0.04, 16),
            new THREE.MeshStandardMaterial({ color: 0xD35400 })
        );
        bowlInner.position.y = 0.1;
        bowlInner.castShadow = true;
        bowlGroup.add(bowlInner);
        for (let i = 0; i < 10; i++) {
            const food = new THREE.Mesh(
                new THREE.SphereGeometry(0.025, 4),
                new THREE.MeshStandardMaterial({ color: 0x6D4C41 })
            );
            food.position.set((Math.random() - 0.5) * 0.18, 0.13 + Math.random() * 0.02, (Math.random() - 0.5) * 0.18);
            food.castShadow = true;
            bowlGroup.add(food);
        }
        bowlGroup.position.set(1.8, 0, -1.8);
        scene.add(bowlGroup);

        // 狗窝
        const dogBedBase = new THREE.Mesh(
            new THREE.CylinderGeometry(0.55, 0.65, 0.1, 16),
            new THREE.MeshStandardMaterial({ color: 0xE74C3C, roughness: 0.9 })
        );
        dogBedBase.position.set(-2.2, 0.05, -2.2);
        dogBedBase.castShadow = true; dogBedBase.receiveShadow = true;
        scene.add(dogBedBase);
        const dogBedEdge = new THREE.Mesh(
            new THREE.TorusGeometry(0.55, 0.06, 8, 16),
            new THREE.MeshStandardMaterial({ color: 0xC0392B })
        );
        dogBedEdge.position.set(-2.2, 0.1, -2.2);
        dogBedEdge.rotation.x = Math.PI / 2;
        dogBedEdge.castShadow = true;
        scene.add(dogBedEdge);

        // 电视
        const tvBody = new THREE.Mesh(
            new THREE.BoxGeometry(0.8, 0.5, 0.05),
            new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.2, metalness: 0.8 })
        );
        tvBody.position.set(-2, 1.2, -3.45);
        tvBody.castShadow = true;
        scene.add(tvBody);
        const tvScreen = new THREE.Mesh(
            new THREE.BoxGeometry(0.7, 0.4, 0.01),
            new THREE.MeshStandardMaterial({ color: 0x3498DB, emissive: 0x1a5276, emissiveIntensity: 0.5 })
        );
        tvScreen.position.set(-2, 1.2, -3.4);
        scene.add(tvScreen);

        // 装饰画
        const picture = new THREE.Mesh(
            new THREE.BoxGeometry(0.4, 0.3, 0.02),
            new THREE.MeshStandardMaterial({ color: 0xF39C12 })
        );
        picture.position.set(1.5, 1.5, -3.45);
        scene.add(picture);

        // 主人 (NPC)
        const ownerGroup = new THREE.Group();
        const ownerBody = new THREE.Mesh(
            new THREE.CylinderGeometry(0.3, 0.4, 0.6, 8),
            new THREE.MeshStandardMaterial({ color: 0x2C3E50 })
        );
        ownerBody.position.y = 0.3;
        ownerBody.castShadow = true;
        ownerGroup.add(ownerBody);
        const ownerHead = new THREE.Mesh(
            new THREE.SphereGeometry(0.18, 8, 8),
            new THREE.MeshStandardMaterial({ color: 0xFAD7A1 })
        );
        ownerHead.position.y = 0.72;
        ownerHead.castShadow = true;
        ownerGroup.add(ownerHead);
        const ownerArmL = new THREE.Mesh(
            new THREE.CylinderGeometry(0.05, 0.06, 0.4, 8),
            new THREE.MeshStandardMaterial({ color: 0xFAD7A1 })
        );
        ownerArmL.position.set(-0.35, 0.4, 0);
        ownerArmL.rotation.z = 0.3;
        ownerArmL.castShadow = true;
        ownerGroup.add(ownerArmL);
        const ownerArmR = ownerArmL.clone();
        ownerArmR.position.set(0.35, 0.4, 0);
        ownerArmR.rotation.z = -0.3;
        ownerGroup.add(ownerArmR);
        const ownerLegL = new THREE.Mesh(
            new THREE.CylinderGeometry(0.06, 0.07, 0.3, 8),
            new THREE.MeshStandardMaterial({ color: 0x1A252F })
        );
        ownerLegL.position.set(-0.12, 0.15, 0.1);
        ownerGroup.add(ownerLegL);
        const ownerLegR = ownerLegL.clone();
        ownerLegR.position.set(0.12, 0.15, 0.1);
        ownerGroup.add(ownerLegR);
        ownerGroup.position.set(-0.5, 0, 2.6);
        ownerGroup.rotation.y = 0.3;
        scene.add(ownerGroup);

        // ==================== 法斗模型 (小八) - 加载OBJ模型 ====================
        const bulldogGroup = new THREE.Group();

        // 加载GLB法斗模型（无水印）
        const gltfLoader = new GLTFLoader();
        gltfLoader.load('french_dog.glb', (gltf) => {
            const model = gltf.scene;
            // 缩小模型，适配场景
            model.scale.set(0.12, 0.12, 0.12);
            // 上移使脚底贴地
            model.position.y = 0.55;
            // 遍历模型，启用阴影
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            bulldogGroup.add(model);
            console.log('🐶 GLB法斗模型加载成功！');
        }, undefined, (error) => {
            console.error('❌ GLB加载失败:', error);
        });

        bulldogGroup.position.set(1, 0, 0.5);
        scene.add(bulldogGroup);

        // ==================== 交互系统 ====================
        const interactables = [
            {
                id: 'bowl', name: '狗粮碗', object: bowlGroup,
                position: new THREE.Vector3(1.8, 0, -1.8),
                action: () => showFeedback('🐶 小八低头吃了几口狗粮... 真香！')
            },
            {
                id: 'bed', name: '狗窝', object: scene,
                position: new THREE.Vector3(-2.2, 0, -2.2),
                action: () => showFeedback('🛌 小八在窝里转了个圈，舒服地趴下了...')
            },
            {
                id: 'tv', name: '电视', object: tvBody,
                position: new THREE.Vector3(-2, 1.2, -3.45),
                action: () => showFeedback('📺 电视里播放着动物世界，小八歪着头看得很认真...')
            },
            {
                id: 'sofa', name: '主人', object: ownerGroup,
                position: new THREE.Vector3(-0.5, 0, 2.6),
                action: () => showFeedback('👤 主人摸了摸小八的头："乖狗狗~"')
            }
        ];

        const hintEl = document.getElementById('interact-hint');
        const feedbackEl = document.getElementById('action-feedback');
        let feedbackTimeout = null;

        function showFeedback(text) {
            feedbackEl.textContent = text;
            feedbackEl.classList.add('show');
            clearTimeout(feedbackTimeout);
            feedbackTimeout = setTimeout(() => feedbackEl.classList.remove('show'), 2500);
        }

        function checkInteraction() {
            const playerPos = bulldogGroup.position;
            let closestDist = Infinity, closestItem = null;
            interactables.forEach(item => {
                const dist = playerPos.distanceTo(item.position);
                if (dist < 2.0 && dist < closestDist) { closestDist = dist; closestItem = item; }
            });
            if (closestItem) {
                hintEl.textContent = `按 E 键 与 ${closestItem.name} 互动`;
                hintEl.classList.add('visible');
                return closestItem;
            } else {
                hintEl.classList.remove('visible');
                return null;
            }
        }

        // ==================== 第三人称控制 ====================
        const keyState = { w: false, a: false, s: false, d: false };
        const moveSpeed = 1.8;
        const playerDir = new THREE.Vector3();

        // 摄像机参数
        let cameraYaw = Math.PI;    // 水平角度
        let cameraPitch = 0.4;     // 俯仰角度
        let cameraDistance = 2.5;  // 距离
        const minDist = 1.5;
        const maxDist = 5.0;
        const mouseSensitivity = 0.003;
        let isMouseDown = false;

        // 鼠标事件 - 使用pageX/Y计算增量
        let lastMouseX = 0, lastMouseY = 0;
        renderer.domElement.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                isMouseDown = true;
                lastMouseX = e.pageX;
                lastMouseY = e.pageY;
            }
        });
        window.addEventListener('mouseup', () => { isMouseDown = false; });
        window.addEventListener('mousemove', (e) => {
            if (!isMouseDown) return;
            const dx = e.pageX - lastMouseX;
            const dy = e.pageY - lastMouseY;
            lastMouseX = e.pageX;
            lastMouseY = e.pageY;
            cameraYaw -= dx * mouseSensitivity;
            cameraPitch -= dy * mouseSensitivity;
            cameraPitch = Math.max(0.05, Math.min(Math.PI / 2 - 0.1, cameraPitch));
        });

        // 滚轮缩放
        renderer.domElement.addEventListener('wheel', (e) => {
            cameraDistance += e.deltaY * 0.005;
            cameraDistance = Math.max(minDist, Math.min(maxDist, cameraDistance));
            e.preventDefault();
        }, { passive: false });

        // 触摸支持
        renderer.domElement.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) isMouseDown = true;
        });
        window.addEventListener('touchend', () => { isMouseDown = false; });
        window.addEventListener('touchmove', (e) => {
            if (!isMouseDown || e.touches.length !== 1) return;
            cameraYaw -= e.touches[0].movementX || 0 * mouseSensitivity;
            cameraPitch -= e.touches[0].movementY || 0 * mouseSensitivity;
            cameraPitch = Math.max(0.05, Math.min(Math.PI / 2 - 0.1, cameraPitch));
        });

        // 键盘
        document.addEventListener('keydown', (e) => {
            switch (e.code) {
                case 'KeyW': keyState.w = true; e.preventDefault(); break;
                case 'KeyA': keyState.a = true; e.preventDefault(); break;
                case 'KeyS': keyState.s = true; e.preventDefault(); break;
                case 'KeyD': keyState.d = true; e.preventDefault(); break;
                case 'KeyE':
                    const item = checkInteraction();
                    if (item) item.action();
                    e.preventDefault();
                    break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch (e.code) {
                case 'KeyW': keyState.w = false; e.preventDefault(); break;
                case 'KeyA': keyState.a = false; e.preventDefault(); break;
                case 'KeyS': keyState.s = false; e.preventDefault(); break;
                case 'KeyD': keyState.d = false; e.preventDefault(); break;
            }
        });

        function updateMovement(dt) {
            // 计算相对于摄像机的移动方向
            const forward = new THREE.Vector3(-Math.sin(cameraYaw), 0, -Math.cos(cameraYaw)).normalize();
            const right = new THREE.Vector3(Math.cos(cameraYaw), 0, -Math.sin(cameraYaw)).normalize();

            playerDir.set(0, 0, 0);
            if (keyState.w) playerDir.add(forward);
            if (keyState.s) playerDir.sub(forward);
            if (keyState.a) playerDir.sub(right);
            if (keyState.d) playerDir.add(right);

            if (playerDir.length() > 0) {
                playerDir.normalize();
                const move = playerDir.clone().multiplyScalar(moveSpeed * dt);

                const newX = bulldogGroup.position.x + move.x;
                const newZ = bulldogGroup.position.z + move.z;

                // 碰撞检测
                const clampedX = Math.max(-3.0, Math.min(3.0, newX));
                const clampedZ = Math.max(-3.0, Math.min(3.0, newZ));

                // 简单家具碰撞
                const furniture = [
                    { x: -0.5, z: 2.4, r: 1.1 },
                    { x: 0.5, z: 1.8, r: 0.7 },
                    { x: -2.2, z: -2.2, r: 0.7 },
                ];

                let canMoveX = true, canMoveZ = true;
                for (const f of furniture) {
                    if (Math.sqrt((clampedX - f.x) ** 2 + (bulldogGroup.position.z - f.z) ** 2) < f.r + 0.35) canMoveX = false;
                    if (Math.sqrt((bulldogGroup.position.x - f.x) ** 2 + (clampedZ - f.z) ** 2) < f.r + 0.35) canMoveZ = false;
                }

                if (canMoveX) bulldogGroup.position.x = clampedX;
                if (canMoveZ) bulldogGroup.position.z = clampedZ;

                // 法斗朝向移动方向
                const targetAngle = Math.atan2(move.x, move.z);
                let angleDiff = targetAngle - bulldogGroup.rotation.y;
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                bulldogGroup.rotation.y += angleDiff * Math.min(1, dt * 8);
            }
        }

        function updateCamera() {
            const target = new THREE.Vector3(
                bulldogGroup.position.x,
                bulldogGroup.position.y + 0.25,
                bulldogGroup.position.z
            );
            const camX = target.x + cameraDistance * Math.sin(cameraYaw) * Math.cos(cameraPitch);
            const camY = target.y + cameraDistance * Math.sin(cameraPitch);
            const camZ = target.z + cameraDistance * Math.cos(cameraYaw) * Math.cos(cameraPitch);

            camera.position.lerp(new THREE.Vector3(camX, camY, camZ), 0.1);
            camera.lookAt(target);
        }

        // ==================== 窗口自适应 ====================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==================== 动画循环 ====================
        const clock = new THREE.Clock();
        let walkCycle = 0;  // 走路循环进度

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1);

            updateMovement(dt);
            updateCamera();

            // 主人翻书动画
            const time = Date.now() * 0.001;
            const ownerArmLRef = ownerGroup.children[2];
            const ownerArmRRef = ownerGroup.children[3];
            if (ownerArmLRef) ownerArmLRef.rotation.x = Math.sin(time * 0.5) * 0.1;
            if (ownerArmRRef) ownerArmRRef.rotation.x = Math.sin(time * 0.5 + 0.5) * 0.1;

            // 检测是否在移动
            const isMoving = keyState.w || keyState.a || keyState.s || keyState.d;

            if (bulldogGroup.children.length > 0 && bulldogGroup.children[0]) {
                const model = bulldogGroup.children[0]; // OBJ加载的模型

                if (isMoving) {
                    // 走路动画：上下颠簸 + 前后摇摆
                    walkCycle += dt * 8;
                    const bounce = Math.abs(Math.sin(walkCycle)) * 0.06;
                    model.position.y = 0.55 + bounce;
                    // 前后轻微摇摆
                    model.rotation.x = Math.sin(walkCycle) * 0.08;
                    // 左右轻微摇摆
                    model.rotation.z = Math.sin(walkCycle * 2) * 0.04;
                } else {
                    // 静止时：呼吸动画 + 平滑回到默认
                    model.position.y += (0.55 - model.position.y) * 0.1;
                    model.rotation.x += (0 - model.rotation.x) * 0.1;
                    model.rotation.z += (0 - model.rotation.z) * 0.1;
                    walkCycle = 0;
                    const breathe = 1 + Math.sin(time * 3) * 0.015;
                    bulldogGroup.scale.set(breathe, breathe, breathe);
                }
            }

            renderer.render(scene, camera);
        }
        animate();

        console.log('🐶 小八的家已加载！第三人称视角 | WASD移动 | 鼠标拖动旋转 | 滚轮缩放 | E键互动');
    </script>
</body>
</html>
